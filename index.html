<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRelato - Limpeza Urbana</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        #mapa { 
            height: 400px; 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Eco<span>Relato</span></h1>
        <p>Ajude a manter a nossa cidade limpa</p>
    </header>

    <main class="container">
        <div id="mapa"></div>

        <section class="upload-card">
            <h2>Reportar Lixo</h2>
            <p>Tire uma foto do local sujo</p>
            
            <div class="camera-box">
                <input type="file" accept="image/*" capture="environment" id="fotoInput" hidden>
                <label for="fotoInput" class="btn-camera">
                    📸 Tirar Foto
                </label>
                <div id="preview">Nenhuma foto selecionada</div>
            </div>

            <div class="status-gps">
                <p id="gpsStatus">📍 Localização: Aguardando...</p>
            </div>

            <button id="btnEnviar" class="btn-enviar" disabled>Enviar Relato</button>
        </section>

        <a href="trabalhador.html" style="display:block; text-align:center; margin-top:20px; color:#666;">
            Acesso restrito: Painel do Trabalhador
        </a>

        <section class="stats">
            <div class="stat-item">
                <span class="number">12</span>
                <span class="label">Pendentes</span>
            </div>
            <div class="stat-item">
                <span class="number">45</span>
                <span class="label">Limpos</span>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
