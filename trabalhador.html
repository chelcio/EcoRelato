<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Trabalhador - EcoRelato</title>

    <!-- CSS do Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Teu CSS -->
    <link rel="stylesheet" href="trabalhador.css">
</head>

<body>

<header>
    <nav>
        <a href="index.html" class="btn-voltar">⬅ Voltar ao Início</a>
        <h1>Painel de <span>Limpeza</span></h1>
    </nav>
</header>

<main class="container">

    <!-- ✅ MAPA (AGORA NO LUGAR CERTO) -->
    <section class="map-section">
        <h2>Mapa de Focos de Lixo</h2>
        <div id="mapa"></div>
    </section>

    <!-- Lista de Tarefas -->
    <section class="tasks-section">
        <h2>Tarefas Pendentes</h2>
        <div id="listaTarefas">
            <div class="task-card">
                <div class="task-info">
                    <strong>📍 Localização: Zona A</strong>
                    <p>Status: <span class="badge pendente">Pendente</span></p>
                </div>
                <button class="btn-acao" onclick="simularLimpeza()">Ver Detalhes</button>
            </div>
        </div>
    </section>

</main>

<!-- ✅ JS do Leaflet (APENAS UMA VEZ e antes do teu JS) -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Teu JS -->
<script src="trabalhador.js"></script>

</body>
</html>
